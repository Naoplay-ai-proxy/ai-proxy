openapi: 3.0.3
info:
  title: Meeting Summary API
  version: 1.0.3
  description: API to generate structured meeting summaries

paths:
  /meeting-summary:
    post:
      summary: Generate meeting summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - meeting_id
                - transcript 
                - language
              properties:
                meeting_id:
                  type: string
                transcript:
                  type: string
                language:
                  type: string
                  example: "fr"
                  enum: ["fr", "en"]
      responses:
        "200":
          description: Summary generated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: 
                  - meeting_id
                  - summary
                  - actions 
                properties:
                  meeting_id:
                    type: string
                  summary:
                    type: string
                  actions:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - owner
                        - description
                      properties:
                        owner:
                          type: string
                        description:
                          type: string
        "400":
          description: Bad Request – The request is malformed or missing required parameters.
        "401":
          description: Unauthorized – Authentication is missing or invalid.
        "422":
          description: Validation Error – The request parameters are syntactically correct but semantically invalid.
        "429":
		  description: Too Many Requests – The request rate limit has been exceeded.
        "500":
          description: Internal Server Error – An unexpected internal error occurred.
        "502":
		  description: Bad Gateway – Upstream service returned an invalid response.
        "503":
		  description: Service Unavailable – The service is temporarily unavailable or overloaded.
        "504":
		  description: Gateway Timeout – The upstream service did not respond in time.
